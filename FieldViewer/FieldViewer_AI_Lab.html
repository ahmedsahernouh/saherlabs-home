<style>

    margin: 0;

  }

    font-family: 'Inter', Arial, sans-serif;

  .fv-ai-page {
    background:
      linear-gradient(180deg, #f8fbfd 0%, #ffffff 42%, #f7f9fb 100%);
    color: #142334;
    min-height: 100vh;
    padding: 30px 22px 42px;
  }

    max-width: 1120px;
    margin: 0 auto;
  }

  .fv-ai-header {
    padding-bottom: 18px;
    margin-bottom: 18px;
    border-bottom: 1px solid #dde6ee;
  }

  .fv-ai-kicker {
    color: #236aa8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .fv-ai-title {
    font-size: 30px;
    line-height: 1.12;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: 0;
    color: #102033;
  }

  .fv-ai-subtitle {
    max-width: 720px;
    color: #5b6f81;
    font-size: 14px;
    line-height: 1.55;
  }

  .fv-ai-home {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    background: #236aa8;
    border: 1px solid #236aa8;
    border-radius: 8px;
    padding: 9px 12px;
    text-decoration: none;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 700;
  }

  .fv-ai-home-row {
    margin-top: 14px;
  }

  .fv-ai-home:hover {
    background: #1d5d96;
    border-color: #1d5d96;
  }

  .fv-ai-note {
    background: #eef6fb;
    border: 1px solid #cfe4f1;
    border-left: 4px solid #236aa8;
    border-radius: 8px;
    color: #274259;
    font-size: 13px;
    line-height: 1.45;
    padding: 11px 13px;
    margin-bottom: 18px;
  }

  .fv-ai-grid {
    display: grid;
    grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
    gap: 18px;
    align-items: start;
  }

  .fv-ai-card {
    background: #ffffff;
    border: 1px solid #dfe7ef;
    border-radius: 8px;

  .fv-ai-section-title {
    color: #102033;
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .fv-ai-section-subtitle {
    color: #6d7f8f;
    font-size: 12px;
    line-height: 1.45;
    margin-bottom: 12px;
  }

  .fv-ai-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 9px;
    margin-bottom: 14px;
  }

  .fv-ai-actions .bk-btn {
    width: 100% !important;
    max-width: 100% !important;
    min-height: 40px;
    border-radius: 8px !important;
    text-align: left;
    font-weight: 700;
  }

  .fv-ai-inputs {
    border-top: 1px solid #e6edf3;
    padding-top: 14px;
    gap: 11px;
  }

  .fv-ai-inputs label,
  .fv-ai-inputs .bk-InputWidget > label,
  .fv-ai-inputs .bk-input-group > label {
    color: #24384d;
    font-size: 12px;
    font-weight: 700;
  }

  .fv-ai-inputs .bk-input {
    border-color: #d4dee8 !important;
    border-radius: 8px !important;
    font-size: 14px !important;
  }

  .fv-ai-custom-row {
    gap: 10px;
    margin-top: 3px;
  }

  .fv-ai-custom-row .bk-btn {
    border-radius: 8px !important;
    min-height: 38px;
    font-weight: 700;
  }

  .fv-ai-unified {
    border-bottom: 1px solid #e6edf3;
    margin-bottom: 14px;
    padding-bottom: 14px;
    gap: 10px;
  }

  .fv-ai-route-badge {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    max-width: 100%;
    border-radius: 999px;
    background: #f4f7fa;
    border: 1px solid #d7e1ea;
    color: #40576b;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 9px;
    margin-bottom: 10px;
  }

    background: #eef7f2;
    border-color: #cde6d6;
    color: #2b6741;
  }

  .fv-ai-route-badge[data-route="rejected"] {
    background: #fff3f2;
    border-color: #f0cfcc;
    color: #9b2d24;
  }

  .fv-ai-route-badge[data-route="request_failed"] {
    background: #fff7ed;
    border-color: #fed7aa;
    color: #9a3412;
  }

  .fv-ai-sql-panel {
    margin-top: 12px;
    background: #ffffff;
    border: 1px solid #dfe7ef;
    border-radius: 8px;
    padding: 12px;
  }

  .fv-ai-sql-panel h3 {
    color: #102033;
    font-size: 14px;
    line-height: 1.2;
    margin: 0 0 9px;
  }

  .fv-ai-sql-panel pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #f6f9fc;
    border: 1px solid #e1e8ef;
    border-radius: 6px;
    color: #17293a;
    font-size: 12px;
    line-height: 1.45;
    margin: 8px 0;
    max-height: 180px;
    overflow: auto;
    padding: 9px;
  }

  .fv-ai-sql-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    color: #5d7082;
    font-size: 12px;
  }

  .fv-ai-sql-copy {
    background: #236aa8;
    border: 1px solid #236aa8;
    border-radius: 8px;
    color: #ffffff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 9px;
  }

  .fv-ai-sql-table-wrap {
    max-height: 260px;
    overflow: auto;
    border: 1px solid #e1e8ef;
    border-radius: 6px;
    margin-top: 10px;
  }

  .fv-ai-sql-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .fv-ai-sql-table th,
  .fv-ai-sql-table td {
    border-bottom: 1px solid #edf2f6;
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }

  .fv-ai-sql-table th {
    background: #f6f9fc;
    color: #24384d;
    font-weight: 700;
    position: sticky;
    top: 0;
  }

  .fv-ai-model-selected,
  .fv-ai-provider-panel {
    background: #f6fafc;
    border: 1px solid #d9e6ee;
    border-radius: 8px;
    color: #2a4156;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px 12px;
  }

  .fv-ai-provider-panel {
    margin-bottom: 12px;
  }

  .fv-ai-provider-panel code {
    background: #edf3f7;
    border-radius: 4px;
    color: #16334d;
    padding: 1px 4px;
  }

  .fv-ai-provider-warning {
    color: #8a4b00;
    font-weight: 700;
    margin-top: 4px;
  }

  .fv-ai-provider-note {
    color: #236a45;
    font-weight: 700;
    margin-top: 4px;
  }

  .fv-ai-screen-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f4f7fa;
    border: 1px solid #dfe7ef;
    border-radius: 999px;
    color: #4e6275;
    font-size: 12px;
    padding: 5px 9px;
    margin: 0 0 12px;
  }

  .fv-ai-answer-card {
    min-height: 560px;
  }

  .fv-ai-answer-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .fv-ai-answer-head h2 {
    font-size: 17px;
    line-height: 1.2;
    margin: 0 0 4px;
    color: #102033;
  }

  .fv-ai-answer-head span {
    color: #6d7f8f;
    font-size: 12px;
  }

  .fv-ai-status {
    min-height: 22px;
    color: #5f7284;
    font-size: 12px;
    line-height: 1.45;
    margin-bottom: 10px;
  }

  .fv-ai-status strong {
    color: #236aa8;
  }

  .fv-ai-error {
    min-height: 22px;
    color: #a32727;
    font-size: 13px;
    line-height: 1.45;
    margin-bottom: 10px;
  }

  .fv-ai-output {
    min-height: 330px;
    background: #fbfdff;
    border: 1px solid #dfe7ef;
    border-radius: 8px;
    overflow: hidden;
  }

  .fv-answer {
    padding: 18px 20px 20px;
    color: #1b2c3d;
    font-size: 14px;
    line-height: 1.65;
  }

  .fv-answer-empty {
    min-height: 300px;
    display: flex;
    align-items: center;
    color: #718292;
  }

  .fv-answer h2,
  .fv-answer h3 {
    color: #102033;
    line-height: 1.28;
    margin: 16px 0 8px;
  }

  .fv-answer h2:first-child,
  .fv-answer h3:first-child {
    margin-top: 0;
  }

  .fv-answer h2 {
    font-size: 18px;
  }

  .fv-answer h3 {
    font-size: 15px;
  }

  .fv-answer p {
    margin: 8px 0;
  }

  .fv-answer ul,
  .fv-answer ol {
    margin: 8px 0 12px 22px;
    padding: 0;
  }

  .fv-answer li {
    margin: 5px 0;
  }

  .fv-answer strong {
    color: #102033;
    font-weight: 700;
  }

  .fv-answer code {
    background: #eef3f7;
    border: 1px solid #d7e1ea;
    border-radius: 4px;
    padding: 1px 4px;
    font-size: 12px;
  }

  .fv-ai-display {
    border-top: 1px solid #e3ebf2;
    margin-top: 16px;
    padding-top: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  .fv-ai-display-title {
    color: #102033;
    font-size: 13px;
    font-weight: 700;
    margin: 0 0 9px;
  }

  .fv-ai-plot {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    max-height: 380px;
    object-fit: contain;
    border: 1px solid #dce6ee;
    border-radius: 8px;
    background: #ffffff;
    margin: 8px 0 12px;
  }

  .fv-ai-map {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    object-fit: contain;
    border: 1px solid #dce6ee;
    border-radius: 8px;
    box-sizing: border-box;
    background: #102033;
    margin: 8px 0 14px;
  }

  .fv-ai-link-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .fv-ai-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: fit-content;
    max-width: 100%;
    box-sizing: border-box;
    color: #ffffff;
    background: #236aa8;
    border: 1px solid #236aa8;
    border-radius: 8px;
    padding: 8px 11px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
  }

  .fv-ai-link:hover {
    background: #1d5d96;
  }

  .fv-ai-meta {
    margin-top: 12px;
    border: 1px solid #e1e8ef;
    border-radius: 8px;
    background: #ffffff;
    color: #4e6275;
    font-size: 12px;
    line-height: 1.45;
  }

  .fv-ai-meta details {
    padding: 10px 12px;
  }

  .fv-ai-meta summary {
    cursor: pointer;
    color: #24384d;
    font-weight: 700;
  }

  .fv-ai-meta pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #f7f9fb;
    border: 1px solid #e4ebf1;
    border-radius: 6px;
    margin: 10px 0 0;
    padding: 10px;
    max-height: 180px;
    overflow: auto;
  }

  body.fv-dark .fv-ai-page,
  body.fv-dark .fv-ai-card,
  body.fv-dark .fv-ai-output,
  body.fv-dark .fv-answer,
  body.fv-dark .fv-ai-meta pre {
    background: #ffffff !important;
    color: #142334 !important;
  }

  @media (max-width: 860px) {
    .fv-ai-header {
      grid-template-columns: 1fr;
    }

    .fv-ai-grid {
      grid-template-columns: 1fr;
    }

    .fv-ai-actions .bk-btn {
      width: 100% !important;
    }

    .fv-ai-page {
      padding: 22px 14px 30px;
    }
  }
</style>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- FIELDVIEWER_UI_THEME_ASSETS -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --fv-surface: #f7f9fb;
    --fv-surface-container: #ffffff;
    --fv-surface-soft: #f1f5f9;
    --fv-border: #e2e8f0;
    --fv-border-strong: #c3c6ce;
    --fv-text: #191c1e;
    --fv-muted: #64748b;
    --fv-primary: #1b3b5a;
    --fv-action: #378add;
    --fv-action-hover: #2a6db5;
    --fv-action-soft: #eef5ff;
    --fv-oil: #1d9e75;
    --fv-water: #378add;
    --fv-gas: #d64f4f;
    --fv-radius-md: 8px;
    --fv-radius-lg: 12px;
    --fv-font-ui: 'DM Sans', Arial, sans-serif;
    --fv-font-data: 'Space Mono', Consolas, monospace;
  }
  html, body {
    min-height: 100%;
    margin: 0;

    color: var(--fv-text);

  }
  body.fv-dark {
    --fv-surface: #0b1a2e;
    --fv-surface-container: #10243b;
    --fv-surface-soft: #142d48;
    --fv-border: #294563;
    --fv-border-strong: #3a5d7f;
    --fv-text: #edf5ff;
    --fv-muted: #a9bdd2;

    --fv-action-soft: #12395d;

    font-family: var(--fv-font-ui) !important;
  }
  .bk-input, .bk-select {
    min-height: 38px !important;

    border-color: var(--fv-border) !important;
    background: #ffffff !important;
    color: #191c1e !important;
  }
  .bk-input:focus, .bk-select:focus {
    border-color: var(--fv-action) !important;
    box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.16) !important;
  }
  .bk-btn {
    min-height: 38px !important;
    border-radius: var(--fv-radius-md) !important;
    font-weight: 700 !important;
  }
  .bk-btn-primary {
    background-color: var(--fv-primary) !important;
    border-color: var(--fv-primary) !important;
    color: #ffffff !important;
  }
  body.fv-dark .bk-btn-primary {
    background-color: #d1e4ff !important;
    border-color: #d1e4ff !important;
    color: #0b1a2e !important;
  }
  .bk-input-group input[type="checkbox"] {
    accent-color: var(--fv-action);
  }
  .fieldviewer-side-panel,
  .fv-generated-panel {
    background: var(--fv-surface-container) !important;
    border: 1px solid var(--fv-border) !important;
    border-radius: var(--fv-radius-lg) !important;
    color: var(--fv-text) !important;
    box-shadow: none !important;
  }
  .fieldviewer-side-panel {
    max-height: calc(100vh - 116px) !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    position: sticky !important;

  }
  .fieldviewer-section-block {
    width: 100% !important;
    box-sizing: border-box !important;
  }
  .fieldviewer-section-toggle .bk-btn,
  .fieldviewer-section-toggle button {
    width: 100% !important;
    justify-content: flex-start !important;
    text-align: left !important;
    background: var(--fv-action) !important;
    border: 1px solid var(--fv-action) !important;
    border-radius: var(--fv-radius-md) !important;
    color: #ffffff !important;
    font-family: var(--fv-font-ui) !important;
    font-size: 12px !important;
    font-weight: 800 !important;
    letter-spacing: 0.04em !important;
    min-height: 36px !important;
    padding: 8px 10px !important;
    text-transform: uppercase !important;
    box-shadow: none !important;
  }
  .fieldviewer-section-toggle .bk-btn:hover,
  .fieldviewer-section-toggle button:hover {
    background: var(--fv-action-hover) !important;
    border-color: var(--fv-action-hover) !important;
  }
  .fieldviewer-section-content {
    padding: 8px 0 2px 0 !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    box-sizing: border-box !important;
  }
  .fieldviewer-section-header,
  .section-header,
  .sidebar-section {
    background: var(--fv-surface-soft) !important;
    border-left: 4px solid var(--fv-primary) !important;
    color: var(--fv-primary) !important;
    border-radius: 0 var(--fv-radius-md) var(--fv-radius-md) 0 !important;
    font-family: var(--fv-font-ui) !important;

    font-weight: 800 !important;
    letter-spacing: 0.04em !important;
    text-transform: uppercase !important;

  body.fv-dark .section-header,
  body.fv-dark .sidebar-section {
    color: #edf5ff !important;

    color: #ffffff;
  }
  .fv-app-brand-title {
    font-weight: 800;
    font-size: 16px;
  }
  .fv-app-brand-subtitle {
    color: #b9cbe0;
    font-size: 12px;
  }
  .fv-sidebar-toggle {
    width: 100%;
    min-height: 34px;
    margin-top: 12px;

    border-radius: var(--fv-radius-md);

    font-family: var(--fv-font-ui);
    font-size: 12px;

  }
  .fv-app-nav {

  .fv-app-nav a {
    text-decoration: none;

    align-items: center;
    gap: 10px;
    min-height: 42px;
    padding: 10px 12px;
    border-radius: var(--fv-radius-md);

{"type":"object","name":"Div","id":"p3257","attributes":{"sizing_mode":"stretch_width","text":"&lt;div class=\"fv-ai-model-selected\"&gt;Selected model: &lt;strong&gt;Free model&lt;/strong&gt;&lt;/div&gt;"}}]]},"code":"\nconst escapeHtml = (value) =&gt; {\n  return String(value === undefined || value === null ? \"\" : value)\n    .replace(/&amp;/g, \"&amp;amp;\")\n    .replace(/&lt;/g, \"&amp;lt;\")\n    .replace(/&gt;/g, \"&amp;gt;\")\n    .replace(/\"/g, \"&amp;quot;\")\n    .replace(/'/g, \"&amp;#39;\");\n};\n\nconst formatInline = (value) =&gt; {\n  return value\n    .replace(/`([^`]+)`/g, \"&lt;code&gt;$1&lt;/code&gt;\")\n    .replace(/\\*\\*([^*]+)\\*\\*/g, \"&lt;strong&gt;$1&lt;/strong&gt;\");\n};\n\nconst wellFromLinkUrl = (url) =&gt; {\n  try {\n    const parsed = new URL(String(url || \"\"), window.location.href);\n    return String(parsed.searchParams.get(\"well\") || parsed.searchParams.get(\"selected_well\") || parsed.searchParams.get(\"uwi\") || \"\").trim();\n  } catch (err) {\n    return \"\";\n  }\n};\n\nconst linkHandoffAttribute = (wellName, url) =&gt; {\n  const well = String(wellName || \"\").trim();\n  if (!well) {\n    return \"\";\n  }\n  return ' data-fieldviewer-well=\"' + escapeHtml(well) + '\"';\n};\n\nconst renderDisplay = (display) =&gt; {\n  if (!display || typeof display !== \"object\") {\n    return \"\";\n  }\n  const mapUrls = Array.isArray(display.map_urls) ? display.map_urls.filter(Boolean) : [];\n  const plotUrls = Array.isArray(display.plot_urls) ? display.plot_urls.filter(Boolean) : [];\n  const links = Array.isArray(display.links) ? display.links.filter((item) =&gt; item &amp;&amp; item.url) : [];\n  if (!mapUrls.length &amp;&amp; !plotUrls.length &amp;&amp; !links.length) {\n    return \"\";\n  }\n  const mapImageStyle = \"display:block;width:100%;max-width:100%;height:auto;box-sizing:border-box;object-fit:contain;border:1px solid #dce6ee;border-radius:8px;background:#102033;margin:8px 0 14px;\";\n  const plotImageStyle = \"display:block;width:100%;max-width:100%;height:auto;box-sizing:border-box;object-fit:contain;border:1px solid #dce6ee;border-radius:8px;background:#ffffff;margin:8px 0 12px;\";\n  const linkListStyle = \"display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px;\";\n  const linkStyle = \"display:inline-flex;align-items:center;justify-content:center;width:fit-content;max-width:100%;box-sizing:border-box;color:#ffffff;background:#236aa8;border:1px solid #236aa8;border-radius:8px;padding:8px 11px;text-decoration:none;font-size:12px;font-weight:700;\";\n  let html = '&lt;div class=\"fv-ai-display\"&gt;';\n  if (mapUrls.length) {\n    html += '&lt;div class=\"fv-ai-display-title\"&gt;Selected well surface map&lt;/div&gt;';\n    for (const url of mapUrls) {\n      html += '&lt;img class=\"fv-ai-map\" style=\"' + mapImageStyle + '\" src=\"' + escapeHtml(url) + '\" alt=\"Selected well surface map\"&gt;';\n    }\n  }\n  if (plotUrls.length) {\n    html += '&lt;div class=\"fv-ai-display-title\"&gt;Generated production profile&lt;/div&gt;';\n    for (const url of plotUrls) {\n      html += '&lt;img class=\"fv-ai-plot\" style=\"' + plotImageStyle + '\" src=\"' + escapeHtml(url) + '\" alt=\"Generated production profile plot\"&gt;';\n    }\n  }\n  if (links.length) {\n    html += '&lt;div class=\"fv-ai-display-title\"&gt;Related FieldViewer links&lt;/div&gt;&lt;div class=\"fv-ai-link-list\" style=\"' + linkListStyle + '\"&gt;';\n    for (const item of links) {\n      const label = item.label || \"Open link\";\n      const handoff = linkHandoffAttribute(wellFromLinkUrl(item.url), item.url);\n      html += '&lt;a class=\"fv-ai-link\" style=\"' + linkStyle + '\" href=\"' + escapeHtml(item.url) + '\" target=\"_blank\" rel=\"noopener noreferrer\"' + handoff + '&gt;' +\n        escapeHtml(label) + '&lt;/a&gt;';\n    }\n    html += '&lt;/div&gt;';\n  }\n  html += '&lt;/div&gt;';\n  return html;\n};\n\nconst renderMarkdown = (raw, display) =&gt; {\n  const text = String(raw || \"\")       if (statusMap && moduleKey === "status") {
        setImportant(el, "display", "none");
        return;
      }
      if ((completionTitle || completionStatus) && moduleKey === "completion") {
        setImportant(el, "display", "none");
        return;
      }
      if (moduleKey === "timeline" && (timelineSpeedInput || timelineDateEdge || timelineSlider)) {
        setImportant(el, "display", "none");
        setImportant(el, "visibility", "hidden");
        setImportant(el, "width", "0");
        setImportant(el, "min-width", "0");
        setImportant(el, "max-width", "0");
        setImportant(el, "height", "0");
        setImportant(el, "min-height", "0");
        setImportant(el, "max-height", "0");
        setImportant(el, "overflow", "hidden");
        setImportant(el, "padding", "0");
        setImportant(el, "margin", "0");
        setImportant(el, "flex", "0 0 0");
        return;
      }

      if (isRow || isCol || isFigure) {
        setImportant(el, "max-width", "100vw");
        setImportant(el, "width", "100%");
        setImportant(el, "box-sizing", "border-box");
      }
      if ((isRow || isCol) && !(mapDominantPage && containsMapFigure)) {
        setImportant(el, "min-height", fullSurfacePage ? fullSurfaceHeight : activePlotHeight);
      }
      if (primaryChart) {
        if (fullChartPage) {
          resizeBokehFigureModel(el, Math.max(280, Math.min(viewportWidth - 16, 900)), fullSurfaceHeightPx);
        }
        setImportant(el, "height", fullChartPage ? fullSurfaceHeight : activePlotHeight);
        setImportant(el, "min-height", fullChartPage ? fullSurfaceHeight : activePlotHeight);
      }
      if (completionViewer && moduleKey === "completion") {
        setImportant(el, "height", fullSurfaceHeight);
        setImportant(el, "min-height", fullSurfaceHeight);
        setImportant(el, "max-height", fullSurfaceHeight);
        setImportant(el, "overflow", "hidden");
      }
      if (completionToolbar && moduleKey === "completion") {
        setImportant(el, "height", "82px");
        setImportant(el, "min-height", "82px");
        setImportant(el, "max-height", "82px");
        setImportant(el, "display", "flex");
        setImportant(el, "flex-direction", "row");
        setImportant(el, "flex-wrap", "wrap");
        setImportant(el, "align-items", "center");
        setImportant(el, "align-content", "center");
        setImportant(el, "gap", "6px");
        setImportant(el, "overflow", "hidden");
        walkDeep(el, function (child) {
          if (!(child instanceof Element)) return;
          var tag = String(child.tagName || "").toLowerCase();
          var isButton = tag === "button" || (child.classList && child.classList.contains("bk-btn"));
          if (!isButton) return;
          setImportant(child, "width", "68px");
          setImportant(child, "min-width", "68px");
          setImportant(child, "max-width", "68px");
          setImportant(child, "height", "34px");
          setImportant(child, "min-height", "34px");
          setImportant(child, "padding", "4px 5px");
          setImportant(child, "font-size", "10px");
          setImportant(child, "line-height", "1.05");
          setImportant(child, "white-space", "normal");
        });
      }
      if (completionImageDiv && moduleKey === "completion") {
        var completionImageHeight = Math.max(300, fullSurfaceHeightPx - 88) + "px";
        setImportant(el, "height", completionImageHeight);
        setImportant(el, "min-height", completionImageHeight);
        setImportant(el, "max-height", completionImageHeight);
        setImportant(el, "overflow", "hidden");
      }
      if (completionImageFrame && moduleKey === "completion") {
        var completionFrameHeight = Math.max(300, fullSurfaceHeightPx - 88) + "px";
        var frameZoom = 1.0;
        try {
          var frameImg = el.querySelector && el.querySelector(".fieldviewer-completion-image");
          frameZoom = Number(frameImg && frameImg.getAttribute("data-fv-completion-zoom"));
        } catch (_) {}
        if (!Number.isFinite(frameZoom) || frameZoom <= 0) frameZoom = 1.0;
        setImportant(el, "height", completionFrameHeight);
        setImportant(el, "min-height", completionFrameHeight);
        setImportant(el, "max-height", completionFrameHeight);
        setImportant(el, "width", "100%");
        setImportant(el, "display", "flex");
        setImportant(el, "overflow", frameZoom > 1.01 ? "auto" : "hidden");
        setImportant(el, "padding", "0");
        setImportant(el, "align-items", "stretch");
        setImportant(el, "justify-content", "stretch");
      }
      if (mapFigure) {
        var mapAspect = mapFallbackAspectForElement(el);
        var mapWidth = Math.max(280, Math.min(viewportWidth - 16, 620));
        var mapHeight = moduleKey === "map" ? fullSurfaceHeightPx : Math.round(mapWidth / mapAspect);
        if (moduleKey === "timeline") {
          mapHeight = Math.max(300, fullSurfaceHeightPx - 112);
        }
        resizeBokehFigureModel(el, mapWidth, mapHeight);
        setImportant(el, "width", "100%");
        setImportant(el, "max-width", "calc(100vw - 16px)");
        setImportant(el, "height", mapHeight + "px");
        setImportant(el, "min-height", mapHeight + "px");
        scheduleBokehMapAspectRepair(el, mapAspect);
      }
      if (isFigure && mainPlotPanel && !primaryChart) {
        if (!mapFigure) {
          setImportant(el, "height", activePlotHeight);
          setImportant(el, "min-height", activePlotHeight);
        }
      }
      if (el.classList && el.classList.contains("fieldviewer-responsive-root") && !(mapDominantPage && containsMapFigure)) {
        setImportant(el, "min-height", fullSurfacePage ? fullSurfaceHeight : activePlotHeight);
      }
      if (el.classList && (
          el.classList.contains("fieldviewer-main-plot-row") ||
          el.classList.contains("fieldviewer-chart-first-panel") ||
          el.classList.contains("fieldviewer-status-main-panel")
        ) && !(mapDominantPage && containsMapFigure)) {
        setImportant(el, "min-height", fullSurfacePage ? fullSurfaceHeight : activePlotHeight);
        if (moduleKey === "status" && el.classList.contains("fieldviewer-status-main-panel")) {
          setImportant(el, "display", "flex");
          setImportant(el, "align-items", "center");
          setImportant(el, "justify-content", "flex-start");
          setImportant(el, "padding-top", "8px");
        }
      }
      if (statusCounts) {
        setImportant(el, "order", "1");
        setImportant(el, "align-self", "center");
        setImportant(el, "align-items", "center");
        setImportant(el, "margin-left", "auto");
        setImportant(el, "margin-right", "auto");
        setImportant(el, "width", "min(360px, calc(100vw - 28px))");
        setImportant(el, "max-width", "calc(100vw - 28px)");
        if (moduleKey === "status") {
          setImportant(el, "height", statusPhoneStackHeight);
          setImportant(el, "min-height", statusPhoneStackHeight);
          setImportant(el, "max-height", statusPhoneStackHeight);
          setImportant(el, "overflow", "hidden");
        } else {
          setImportant(el, "height", "auto");
          setImportant(el, "min-height", "auto");
          setImportant(el, "max-height", requestedOpen ? "34vh" : "50vh");
          setImportant(el, "overflow", "auto");
        }
        walkDeep(el, function (child) {
          if (!(child instanceof Element)) return;
          var childClass = "";
          try { childClass = String(child.className || ""); } catch (_) {}
          var childStyle = "";
          try { childStyle = String(child.getAttribute("style") || ""); } catch (_) {}
          var isCurrentStatusCard = childClass.indexOf("fs-current-status-card") !== -1 ||
            (child.classList && child.classList.contains("fs-current-status-card")) ||
            childStyle.indexOf("fs-current-status-card") !== -1;
          var containsCurrentStatusCard = false;
          try {
            containsCurrentStatusCard = !!(
              child.querySelector && (
                child.querySelector(".fs-current-status-card") ||
                child.querySelector("[class*='fs-current-status-card']")
              )
            );
          } catch (_) {}
          if (!(isCurrentStatusCard || containsCurrentStatusCard)) return;
          setImportant(child, "min-height", "0");
          setImportant(child, "height", statusPhoneCardHeight);
          setImportant(child, "max-height", statusPhoneCardHeight);
          setImportant(child, "overflow", "auto");
        });
      }
      if (statusMap) {
        setImportant(el, "order", "2");
      }
      if (chartLegend) {
        setImportant(el, "order", "-1");
        setImportant(el, "height", "92px");
        setImportant(el, "min-height", "78px");
        setImportant(el, "max-height", requestedOpen ? "104px" : "122px");
        setImportant(el, "overflow-y", "auto");
      }
      if (timelineTimeInfo) {
        setImportant(el, "width", "100%");
        setImportant(el, "max-width", "calc(100vw - 16px)");
        setImportant(el, "min-height", "28px");
        setImportant(el, "height", "auto");
        setImportant(el, "text-align", "center");
        setImportant(el, "font-size", "13px");
        setImportant(el, "line-height", "1.25");
      }
      if (timelinePlayRow || timelineSliderRow || timelineSlider) {
        setImportant(el, "max-width", "calc(100vw - 16px)");
        setImportant(el, "width", "100%");
        setImportant(el, "min-width", "0");
      }
      if (timelinePlayRow || timelineSliderRow) {
        setImportant(el, "display", "flex");
        setImportant(el, "flex-direction", "row");
        setImportant(el, "align-items", "center");
        setImportant(el, "justify-content", "center");
        setImportant(el, "gap", "8px");
        setImportant(el, "min-height", "42px");
        walkDeep(el, function (child) {
          if (!(child instanceof Element)) return;
          var childIsHiddenTimeline = child.classList && (
            child.classList.contains("fieldviewer-timeline-speed-input") ||
            child.classList.contains("fieldviewer-timeline-date-edge") ||
            child.classList.contains("fieldviewer-timeline-slider")
          );
          if (childIsHiddenTimeline) {
            setImportant(child, "display", "none");
            setImportant(child, "visibility", "hidden");
            setImportant(child, "width", "0");
            setImportant(child, "min-width", "0");
            setImportant(child, "max-width", "0");
            setImportant(child, "height", "0");
            setImportant(child, "min-height", "0");
            setImportant(child, "max-height", "0");
            setImportant(child, "overflow", "hidden");
            setImportant(child, "padding", "0");
            setImportant(child, "margin", "0");
            setImportant(child, "flex", "0 0 0");
            return;
          }
          var childTag = String(child.tagName || "").toLowerCase();
          var childButton = childTag === "button" || (child.classList && child.classList.contains("bk-btn"));
          if (!childButton) return;
          var isStepButton = String(child.textContent || "").trim() === "<" || String(child.textContent || "").trim() === ">";
          setImportant(child, "width", isStepButton ? "48px" : "74px");
          setImportant(child, "min-width", isStepButton ? "48px" : "54px");
          setImportant(child, "max-width", isStepButton ? "48px" : "88px");
          setImportant(child, "height", "36px");
          setImportant(child, "min-height", "36px");
          setImportant(child, "padding", "5px 8px");
          setImportant(child, "font-size", isStepButton ? "17px" : "13px");
          setImportant(child, "line-height", "1");
        });
      }
      if (timelineSlider) {
        setImportant(el, "height", "48px");
        setImportant(el, "min-height", "48px");
      }
      if (isRow) {
        setImportant(el, "flex-direction", (timelinePlayRow || timelineSliderRow) ? "row" : "column");
      }
      if (completionToolbar && moduleKey === "completion") {
        setImportant(el, "flex-direction", "row");
        setImportant(el, "flex-wrap", "wrap");
      }
      if (sidePanel) {
        setImportant(el, "position", "fixed");
        setImportant(el, "left", "0");
        setImportant(el, "right", "0");
        setImportant(el, "bottom", requestedOpen ? "98px" : "-62vh");
        setImportant(el, "top", "auto");
        setImportant(el, "z-index", "10000");
        setImportant(el, "width", "100vw");
        setImportant(el, "max-width", "100vw");
        setImportant(el, "min-width", "0");
        setImportant(el, "height", "62vh");
        setImportant(el, "max-height", "62vh");
        setImportant(el, "overflow", "auto");
        setImportant(el, "border-radius", "12px 12px 0 0");
        setImportant(el, "box-shadow", "0 -12px 32px rgba(27,59,90,0.26)");
        setImportant(el, "padding", "10px");
        setImportant(el, "background", "var(--fv-surface-container)");
      }
      if (keyPanel) {
        setImportant(el, "display", "none");
      }
    });
  }

  function apply(theme) {
    var dark = theme === "dark";
    document.body.classList.toggle("fv-dark", dark);
    var btn = document.getElementById("fvShellThemeToggle");
    if (btn) {
      btn.textContent = dark ? "Light Mode" : "Dark Mode";
      btn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
    }
  }
  function init() {
    ensureAppShell();
    var expanded = false;
    try { expanded = localStorage.getItem("fieldviewer-sidebar-expanded") === "1"; } catch (_) {}
    document.body.classList.toggle("fv-sidebar-expanded", expanded);
    var sidebarToggle = document.querySelector(".fv-sidebar-toggle");
    if (sidebarToggle) sidebarToggle.textContent = expanded ? "Collapse" : "Menu";
    if (!document.getElementById("fvShellThemeToggle")) {
      var btn = document.createElement("button");
      btn.id = "fvShellThemeToggle";
      btn.className = "fv-shell-theme-toggle";
      btn.type = "button";
      btn.addEventListener("click", function () {
        var next = document.body.classList.contains("fv-dark") ? "light" : "dark";
        try { localStorage.setItem(key, next); } catch (_) {}
        apply(next);
      });
      document.body.appendChild(btn);
    }
    var saved = "light";
    try { saved = localStorage.getItem(key) || "light"; } catch (_) {}
    apply(saved);
    ensurePanelActions(currentModule());
    applyResponsive();
    window.addEventListener("resize", applyResponsive);
    window.addEventListener("orientationchange", function () { setTimeout(applyResponsive, 120); });
    setTimeout(applyResponsive, 500);
    setTimeout(function () { ensurePanelActions(currentModule()); applyResponsive(); }, 1500);
    setTimeout(function () { ensurePanelActions(currentModule()); applyResponsive(); }, 3000);
    setTimeout(function () { ensurePanelActions(currentModule()); applyResponsive(); }, 6000);
    try {
      var pendingResponsive = null;
      var observer = new MutationObserver(function () {
        if (pendingResponsive) clearTimeout(pendingResponsive);
        pendingResponsive = setTimeout(function () {
          pendingResponsive = null;
          ensurePanelActions(currentModule());
          applyResponsive();
        }, 160);
      });
      observer.observe(document.body, { childList: true, subtree: true });
    } catch (_) {}
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
